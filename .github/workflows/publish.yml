name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "packages/*/package.json"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Check if version is already published
        id: check
        run: |
          PKG_NAME=$(jq -r .name packages/${{ matrix.package }}/package.json)
          PKG_VERSION=$(jq -r .version packages/${{ matrix.package }}/package.json)
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: bun run --filter $(jq -r .name packages/${{ matrix.package }}/package.json) build

      - name: Pack
        if: steps.check.outputs.exists == 'false'
        working-directory: packages/${{ matrix.package }}
        run: bun pm pack

      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: |
          cp packages/${{ matrix.package }}/*.tgz /tmp/
          cd /tmp
          npm publish --provenance --access public *.tgz
